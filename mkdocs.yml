site_name: Multi-Step Transcriber
site_url: https://github.com/geraldthewes/multistep-transcriber # Replace if you have a deployed docs site URL
repo_url: https://github.com/geraldthewes/multistep-transcriber
repo_name: geraldthewes/multistep-transcriber
edit_uri: "" # Optional: link to edit page, e.g., edit/main/docs/
docs_dir: documentation
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: indigo
      accent: indigo
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: indigo
      accent: indigo

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Algorithm: Planning.md
  - API Reference:
    - Overview: api/README.md
    - VideoTranscriber: api/mst.VideoTranscriber.md
    - Configuration: api/config.md
    - Core Steps:
      - Caching: api/mst.steps.caching.md
      - Diarization: api/mst.steps.diarization.md
      - Entities: api/mst.steps.entities.md
      - Formatting: api/mst.steps.format.md
      - Helpers: api/mst.steps.helpers.md
      - Introductions: api/mst.steps.introductions.md
      - LLM Client: api/mst.steps.llm_client.md
      - Merge Sentences: api/mst.steps.merge_sentences.md
      - Models: api/mst.steps.models.md
      - Standardize: api/mst.steps.standardize.md
      - Topic Segmentation: api/mst.steps.topic_segmentation.md
      - Transcription: api/mst.steps.transcription.md
  - Conventions: CONVENTIONS.md
  - Todo: todo.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/geraldthewes/multistep-transcriber

copyright: Copyright &copy; 2024 Gerald Thewes # Update with your name/organization
